<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบคะแนน - Student Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; background-color: #f0f9ff; }</style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 pt-16">

    <div class="fixed top-4 left-4 z-50">
        <a href="index.html" class="flex items-center gap-2 text-slate-600 hover:text-blue-600 font-bold bg-white/90 backdrop-blur px-5 py-2.5 rounded-full shadow-md border border-slate-100 hover:scale-105 transition-all">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" /></svg>
            กลับหน้าหลัก
        </a>
    </div>

    <div class="max-w-xl w-full">
        <div class="bg-white p-6 sm:p-8 rounded-[2rem] shadow-xl border border-blue-50 text-center mb-6 relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-sky-400 to-blue-600"></div>
            
            <div class="w-20 h-20 bg-sky-50 text-sky-600 rounded-full flex items-center justify-center mx-auto mb-4 border-4 border-white shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M12 14l9-5-9-5-9 5 9 5z" /><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" /></svg>
            </div>
            <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Student Portal</h1>
            <p class="text-slate-500 mt-2 mb-6 font-medium">ดูคะแนนและเกรดแยกตามรายวิชา</p>
            
            <div class="space-y-4 mb-2">
                <div class="relative text-left">
                    <label class="block text-sm font-bold text-slate-700 mb-2 pl-2">1. เลือกวิชาเรียน</label>
                    <select id="student-subject-select" class="w-full px-5 py-4 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-sky-500 text-lg appearance-none bg-slate-50 font-medium text-slate-700 cursor-pointer transition">
                        <option value="">-- โหลดข้อมูลวิชา --</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-5 text-slate-500 mt-8">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>

                <div class="text-left">
                    <label class="block text-sm font-bold text-slate-700 mb-2 pl-2">2. รหัสประจำตัวนักเรียน</label>
                    <div class="flex flex-col sm:flex-row gap-3">
                        <input type="text" id="student-id-input" placeholder="พิมพ์รหัสนักเรียน..." class="flex-1 px-5 py-4 border-2 border-slate-200 rounded-2xl focus:outline-none focus:border-sky-500 text-xl font-bold text-center sm:text-left transition tracking-wider text-slate-800">
                        <button id="btn-search" class="px-8 py-4 bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 text-white font-bold rounded-2xl shadow-lg hover:shadow-blue-500/30 transition active:scale-95 whitespace-nowrap flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                            ตรวจสอบ
                        </button>
                    </div>
                </div>
            </div>
            
            <p id="search-error" class="text-red-500 mt-4 hidden font-bold bg-red-50 py-2 rounded-xl"></p>
        </div>

        <div id="result-section" class="hidden space-y-6 animate-fade-in">
            
            <div class="bg-gradient-to-br from-blue-700 to-indigo-800 p-8 rounded-[2rem] shadow-xl text-white relative overflow-hidden border border-blue-600">
                <div class="absolute top-0 right-0 -mt-10 -mr-10 w-40 h-40 bg-white opacity-10 rounded-full blur-3xl"></div>
                <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-black/20 to-transparent pointer-events-none"></div>
                
                <div class="relative z-10">
                    <div class="inline-block px-3 py-1 bg-white/20 rounded-full text-xs font-bold mb-3 tracking-widest uppercase">
                        วิชา: <span id="r-subject-label"></span>
                    </div>
                    <h2 id="r-name" class="text-3xl font-extrabold mb-1">ชื่อ-สกุล</h2>
                    <p id="r-info" class="text-blue-200 text-sm font-medium mb-6">รหัส: - | แผนก: - | ห้อง: -</p>
                    
                    <div class="grid grid-cols-2 gap-4 divide-x divide-white/20 border-t border-white/20 pt-6">
                        <div class="text-center">
                            <p class="text-blue-200 text-xs font-bold uppercase tracking-wider mb-1">คะแนนเก็บรวม</p>
                            <p class="text-5xl font-extrabold"><span id="r-score">0</span><span class="text-xl text-blue-300 font-medium"> / <span id="r-max">0</span></span></p>
                        </div>
                        <div class="text-center">
                            <p class="text-blue-200 text-xs font-bold uppercase tracking-wider mb-1">เกรดรายวิชานี้</p>
                            <p id="r-grade" class="text-5xl font-extrabold text-emerald-400 drop-shadow-md">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-lg border border-slate-100 overflow-hidden">
                <div class="p-6 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2 text-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-500" viewBox="0 0 20 20" fill="currentColor"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" /><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" /></svg>
                        รายละเอียดชิ้นงาน
                    </h3>
                    <span id="task-count" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold">0 ชิ้น</span>
                </div>
                <div class="p-6">
                    <ul id="assignment-list" class="space-y-4">
                        </ul>
                </div>
            </div>

        </div>
    </div>

    <script src="check-grade.js"></script>
</body>
</html>
