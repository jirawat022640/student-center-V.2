<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Subjects - Student Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <nav class="bg-white shadow-sm border-b border-slate-200 p-4 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <a href="index.html" class="text-slate-500 hover:text-blue-600 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                </a>
                <h1 class="text-xl font-bold text-slate-800">จัดการรายวิชา</h1>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4 md:p-6 mt-4">
        
        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 mb-8">
            <h2 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" /></svg>
                เพิ่มวิชาเรียนใหม่
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">รหัสวิชา</label>
                    <input type="text" id="sub-id" placeholder="เช่น ENG-101" class="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-600 mb-1">ชื่อวิชา</label>
                    <input type="text" id="sub-name" placeholder="เช่น ภาษาอังกฤษเพื่อการสื่อสาร" class="w-full px-4 py-3 border border-slate-300 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition">
                </div>
            </div>
            <div class="mt-4 flex justify-end">
                <button id="btn-add-subject" class="w-full md:w-auto px-8 py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 shadow-md transition">
                    บันทึกวิชาเรียน
                </button>
            </div>
        </div>

        <h2 class="text-lg font-bold text-slate-800 mb-4 px-2">รายวิชาทั้งหมดในระบบ</h2>
        <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left min-w-max">
                    <thead class="bg-slate-100 border-b border-slate-200">
                        <tr>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600 w-1/3">รหัสวิชา</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600 w-1/2">ชื่อวิชา</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="subject-list-body" class="divide-y divide-slate-100">
                        <tr><td colspan="3" class="px-6 py-8 text-center text-slate-500">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="manage-subjects.js"></script>
</body>
</html>
