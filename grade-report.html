<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สรุปผลการเรียน (Grade Report) - Student Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }</style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-white shadow-sm border-b border-slate-200 p-4 sticky top-0 z-40 mb-6">
        <div class="max-w-6xl mx-auto flex items-center gap-3">
            <a href="index.html" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-all active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">สรุปผลการเรียน (Grade Report)</h1>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 md:px-6">

        <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 mb-6 flex flex-col md:flex-row gap-4 items-end">
            <div class="w-full md:w-1/3">
                <label class="block text-sm font-bold text-slate-700 mb-2">1. เลือกวิชา</label>
                <div class="relative">
                    <select id="report-subject" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-slate-50 font-medium text-slate-700 cursor-pointer">
                        <option value="">-- กำลังโหลดวิชา --</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>
            
            <div class="w-full md:w-1/3">
                <label class="block text-sm font-bold text-slate-700 mb-2">2. เลือกห้องเรียน</label>
                <div class="relative">
                    <select id="report-room" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-slate-50 font-medium text-slate-700 cursor-pointer">
                        <option value="">-- กำลังโหลดห้องเรียน --</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-1/3">
                <button id="btn-generate" class="w-full py-3 bg-blue-600 text-white rounded-xl font-bold shadow-md hover:bg-blue-700 hover:shadow-lg transition-all flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg>
                    ดึงข้อมูลสรุปผล
                </button>
            </div>
        </div>

        <p id="report-status" class="text-center font-bold text-blue-600 mb-4 hidden"></p>

        <div class="bg-white rounded-[2rem] shadow-lg border border-slate-200 overflow-hidden hidden" id="report-container">
            <div class="p-5 bg-slate-50 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4">
                <h3 class="font-bold text-slate-800 text-lg" id="report-title">สรุปผลการเรียน (ยังไม่ได้เลือกวิชา)</h3>
                <button id="btn-export" class="w-full sm:w-auto px-6 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl shadow-md transition-all flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                    ดาวน์โหลด Excel
                </button>
            </div>
            <div class="overflow-x-auto p-4">
                <table id="grade-table" class="w-full text-left min-w-max border-collapse">
                    <thead class="bg-blue-50 border-y border-blue-100">
                        <tr>
                            <th class="px-6 py-4 text-sm font-bold text-slate-700 w-16 text-center">ลำดับ</th>
                            <th class="px-6 py-4 text-sm font-bold text-slate-700 w-32">รหัสนักเรียน</th>
                            <th class="px-6 py-4 text-sm font-bold text-slate-700">ชื่อ-นามสกุล</th>
                            <th class="px-6 py-4 text-sm font-bold text-slate-700">แผนก (ห้อง)</th>
                            <th class="px-6 py-4 text-sm font-bold text-blue-700 text-center">คะแนนเก็บ (รวม)</th>
                            <th class="px-6 py-4 text-sm font-extrabold text-emerald-700 text-center">เกรดเฉลี่ย</th>
                        </tr>
                    </thead>
                    <tbody id="report-body" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="grade-report.js"></script>
</body>
</html>
