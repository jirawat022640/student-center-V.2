<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner - Student Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f8fafc; }
        #reader-container { border-radius: 1rem; overflow: hidden; }
        #reader video { object-fit: cover !important; border-radius: 1rem; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <nav class="bg-white shadow-sm border-b border-slate-200 p-4 sticky top-0 z-40 mb-6">
        <div class="max-w-md mx-auto flex items-center gap-3">
            <a href="index.html" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-all active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
            </a>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">กลับหน้าหลัก</h1>
        </div>
    </nav>

    <div class="max-w-md mx-auto bg-white rounded-[2rem] shadow-xl p-6 border border-slate-100 mx-4">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-extrabold text-slate-800 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                สแกนส่งงาน / เช็คชื่อ
            </h1>
            <p class="text-sm text-slate-500 mt-2 font-medium">หันกล้องไปที่ QR Code ของนักเรียน</p>
        </div>

        <div class="mb-6 space-y-4 bg-blue-50/50 p-5 rounded-2xl border border-blue-100">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">รหัสวิชา (Subject ID)</label>
                <div class="relative">
                    <select id="subject-id" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-white font-medium text-slate-700 shadow-sm cursor-pointer">
                        <option value="">-- กำลังโหลดข้อมูลวิชา --</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">รหัสงาน (Assignment ID)</label>
                <div class="relative">
                    <select id="assignment-id" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 appearance-none bg-white font-medium text-slate-700 shadow-sm cursor-pointer">
                        <option value="">-- กำลังโหลดข้อมูลชิ้นงาน --</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>
        </div>

        <div id="reader-container" class="mb-6 relative bg-slate-100 border-2 border-dashed border-slate-300 min-h-[280px] flex items-center justify-center">
            <div id="reader" class="w-full"></div>
            <div id="camera-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                </svg>
                <span class="font-medium">กดปุ่มด้านล่างเพื่อเปิดกล้อง</span>
            </div>
        </div>

        <div class="flex justify-center mb-6">
            <button id="btn-start" class="w-full py-4 bg-blue-600 text-white rounded-2xl shadow-lg hover:shadow-blue-500/30 hover:bg-blue-700 transition-all active:scale-95 font-bold text-lg flex items-center justify-center gap-2">
                เปิดกล้องสแกน
            </button>
            <button id="btn-stop" class="w-full py-4 bg-red-500 text-white rounded-2xl shadow-lg hover:shadow-red-500/30 hover:bg-red-600 transition-all active:scale-95 font-bold text-lg hidden flex items-center justify-center gap-2">
                ปิดกล้อง
            </button>
        </div>

        <div id="result-container" class="hidden text-center p-6 bg-emerald-50 rounded-2xl border border-emerald-200 transition-all duration-300">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-emerald-100 rounded-full mb-3 shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
            </div>
            <h2 id="scanned-result" class="text-4xl font-extrabold text-slate-800 mb-1 tracking-tight">-</h2>
            <p class="text-sm text-slate-500 mb-4 font-medium">รหัสนักเรียน</p>
            <div id="status-badge" class="inline-block px-4 py-1.5 rounded-full text-sm font-bold bg-blue-100 text-blue-700 animate-pulse">
                กำลังส่งข้อมูลไปยังฐานข้อมูล...
            </div>
        </div>
        
        <audio id="beep-sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>
    </div>

    <script src="app.js"></script>
</body>
</html>
