<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>QR Scanner - Student Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-6">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800">📷 สแกนส่งงาน / เช็คชื่อ</h1>
            <p class="text-sm text-slate-500 mt-2">หันกล้องไปที่ QR Code ของนักเรียน</p>
        </div>

        <div class="mb-4 space-y-3 bg-blue-50 p-4 rounded-xl border border-blue-100">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">รหัสวิชา (Subject ID)</label>
                <input type="text" id="subject-id" placeholder="เช่น ENG-101" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">รหัสงาน (Assignment ID)</label>
                <input type="text" id="assignment-id" placeholder="เช่น HW-01" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div id="reader-container" class="mb-6 relative">
            <div id="reader"></div>
            <div id="camera-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 pointer-events-none">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
                <span>กดปุ่มด้านล่างเพื่อเปิดกล้อง</span>
            </div>
        </div>

        <div class="flex gap-3 justify-center mb-6">
            <button id="btn-start" class="w-full py-3 bg-blue-600 text-white rounded-lg shadow-md hover:bg-blue-700 transition font-medium flex items-center justify-center gap-2">
                เปิดกล้องสแกน
            </button>
            <button id="btn-stop" class="w-full py-3 bg-red-500 text-white rounded-lg shadow-md hover:bg-red-600 transition font-medium hidden flex items-center justify-center gap-2">
                ปิดกล้อง
            </button>
        </div>

        <div id="result-container" class="hidden text-center p-5 bg-green-50 rounded-xl border border-green-200 transition-all duration-300">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-green-100 rounded-full mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2 id="scanned-result" class="text-3xl font-bold text-slate-800 mb-1">-</h2>
            <p class="text-sm text-slate-500 mb-3">รหัสนักเรียน</p>
            <div id="status-badge" class="inline-block px-3 py-1 rounded-full text-sm font-medium bg-blue-100 text-blue-700">
                กำลังส่งข้อมูลไปยังฐานข้อมูล...
            </div>
        </div>
        
        <audio id="beep-sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3" preload="auto"></audio>
    </div>

    <script src="app.js"></script>
</body>
</html>
