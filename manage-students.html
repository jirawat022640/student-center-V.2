<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Students - Student Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-6xl mx-auto p-6">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <h1 class="text-3xl font-bold text-slate-800">👥 จัดการข้อมูลนักเรียน</h1>
            
            <div class="flex gap-3 w-full md:w-auto">
                <input type="file" id="csv-file" accept=".csv" class="hidden" onchange="handleFileUpload(event)">
                <button onclick="document.getElementById('csv-file').click()" id="btn-upload" class="flex-1 md:flex-none px-5 py-2.5 bg-emerald-600 text-white rounded-xl shadow hover:bg-emerald-700 transition flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
                    <span>อัปโหลดไฟล์ CSV</span>
                </button>
                <button onclick="openModal()" class="flex-1 md:flex-none px-5 py-2.5 bg-blue-600 text-white rounded-xl shadow hover:bg-blue-700 transition flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                    เพิ่มนักเรียน
                </button>
            </div>
        </div>

        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex gap-4">
            <input type="text" id="search-input" placeholder="ค้นหาชื่อหรือรหัส..." class="flex-1 px-4 py-2 border rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            <select id="filter-room" class="px-4 py-2 border rounded-xl outline-none">
                <option value="">ทุกห้องเรียน</option>
            </select>
        </div>

        <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left min-w-max">
                    <thead class="bg-slate-100 border-b">
                        <tr>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600">รหัสประจำตัว</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600">ชื่อ-นามสกุล</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600">แผนก/ระดับ</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600">ห้อง</th>
                            <th class="px-6 py-4 text-sm font-semibold text-slate-600 text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="student-list-body" class="divide-y divide-slate-100">
                        <tr><td colspan="5" class="px-6 py-4 text-center text-slate-500">กำลังโหลดข้อมูล...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="student-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h2 id="modal-title" class="text-2xl font-bold mb-6 text-slate-800">เพิ่มนักเรียน</h2>
            <div class="space-y-4">
                <input type="text" id="m-id" placeholder="รหัสนักเรียน" class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="m-name" placeholder="ชื่อ-นามสกุล" class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="m-level" placeholder="ระดับ (เช่น ปวช.1)" class="px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="text" id="m-room" placeholder="ห้อง (เช่น 1/1)" class="px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <input type="text" id="m-dept" placeholder="แผนกวิชา (เช่น ช่างยนต์)" class="w-full px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-semibold hover:bg-slate-200 transition">ยกเลิก</button>
                <button onclick="saveStudent()" id="btn-save-modal" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-semibold hover:bg-blue-700 transition">บันทึกข้อมูล</button>
            </div>
        </div>
    </div>

    <script src="manage-students.js"></script>
</body>
</html>
