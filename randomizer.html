<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Student Randomizer - Student Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; overflow: hidden; background: linear-gradient(135deg, #1e293b, #0f172a); }</style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center text-white p-6 relative">

    <div class="w-full max-w-2xl bg-white/10 backdrop-blur-md rounded-3xl p-8 border border-white/20 shadow-2xl text-center z-10">
        <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 mb-6">
            🎲 ระบบสุ่มชื่อนักเรียน
        </h1>
        
        <div class="mb-6 flex gap-4 justify-center items-center">
            <select id="room-select" class="bg-slate-800 text-white px-4 py-3 rounded-xl border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500 min-w-[200px]">
                <option value="">กำลังโหลดข้อมูลห้องเรียน...</option>
            </select>
        </div>

        <div class="bg-slate-800/50 rounded-2xl p-10 mb-8 min-h-[200px] flex flex-col justify-center items-center border border-slate-700 shadow-inner">
            <p id="random-id" class="text-2xl text-slate-400 mb-2 font-mono tracking-widest">-</p>
            <h2 id="random-name" class="text-5xl font-bold text-white leading-tight">รอการสุ่ม...</h2>
        </div>

        <button id="btn-random" class="w-full sm:w-auto px-10 py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-xl font-bold rounded-full shadow-lg transform transition active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
            หมุนสุ่มชื่อ! (SPIN)
        </button>
    </div>

    <audio id="spin-sound" src="https://www.soundjay.com/misc/sounds/magic-chime-01.mp3" preload="auto"></audio>

    <script src="randomizer.js"></script>
</body>
</html>
