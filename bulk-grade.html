<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>Bulk Grading - Student Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen p-6">

    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-lg p-6">
        <div class="border-b border-slate-200 pb-4 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">📝 ระบบลงคะแนนรายห้อง (Bulk Grading)</h1>
                <p class="text-sm text-slate-500">กรอกคะแนนให้นักเรียนทั้งห้องและบันทึกพร้อมกัน</p>
            </div>
            
            <button id="btn-save-all" class="px-6 py-2.5 bg-green-600 text-white rounded-lg shadow hover:bg-green-700 transition font-medium flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                </svg>
                บันทึกคะแนนทั้งหมด
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 bg-blue-50 p-4 rounded-xl border border-blue-100">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">เลือกห้องเรียน</label>
                <select id="grade-room-select" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="">กำลังโหลดข้อมูล...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">รหัสงาน (Assignment ID)</label>
                <input type="text" id="assign-id" placeholder="เช่น HW-01" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex items-end">
                <p id="grade-status" class="w-full text-sm font-medium text-blue-600 py-2">-</p>
            </div>
        </div>

        <div class="overflow-x-auto rounded-lg border border-slate-200">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-100">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">ลำดับ</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">รหัสนักเรียน</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">ชื่อ - สกุล</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">แผนก</th>
                        <th class="px-6 py-3 text-center text-xs font-medium text-slate-500 uppercase tracking-wider">คะแนนที่ได้</th>
                    </tr>
                </thead>
                <tbody id="student-table-body" class="bg-white divide-y divide-slate-200">
                    <tr><td colspan="5" class="px-6 py-4 text-center text-slate-500">กรุณาเลือกห้องเรียนเพื่อแสดงรายชื่อ</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="bulk-grade.js"></script>
</body>
</html>
