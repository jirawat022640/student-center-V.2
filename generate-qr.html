<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>QR Code Generator - Student Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Prompt', sans-serif; }
        /* ตั้งค่าหน้ากระดาษเวลาพิมพ์เป็น A4 */
        @media print {
            @page { size: A4; margin: 10mm; }
            body { background-color: white; }
            /* บังคับให้การ์ดไม่ถูกตัดครึ่งหน้าเวลาขึ้นหน้าใหม่ */
            .qr-card { page-break-inside: avoid; break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-6">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-md p-6 mb-8 print:hidden">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">🖨️ ระบบสร้าง QR Code นักเรียน</h1>
                <p class="text-slate-500 text-sm mt-1">ดึงข้อมูลจากฐานข้อมูลเพื่อสร้างบัตร และส่งออกเป็น PDF</p>
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <button id="btn-fetch" class="flex-1 md:flex-none px-5 py-2.5 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 transition font-medium flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                    ดึงข้อมูลนักเรียน
                </button>
                <button id="btn-print" class="flex-1 md:flex-none px-5 py-2.5 bg-green-600 text-white rounded-lg shadow hover:bg-green-700 transition font-medium flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                    </svg>
                    พิมพ์ / บันทึก PDF
                </button>
            </div>
        </div>
        
        <div id="status-message" class="mt-4 text-center text-blue-600 font-medium hidden">
            กำลังเชื่อมต่อฐานข้อมูล...
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <div id="qr-container" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6">
            </div>
    </div>

    <script src="generate-qr.js"></script>
</body>
</html>
